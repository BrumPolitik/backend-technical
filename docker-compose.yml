services:
  postgres:
    image: postgres:16-alpine
    container_name: titanbay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-titanbay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-titanbay_secret}
      POSTGRES_DB: ${POSTGRES_DB:-titanbay_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-titanbay} -d ${POSTGRES_DB:-titanbay_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    driver: local
